<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tabla de Goleadores</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
    background-color: #f0f2f5;
  }
  h1 {
    text-align: center;
  }
  form {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
  }
  form input, form select {
    padding: 8px;
    font-size: 14px;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    background-color: #fff;
  }
  th, td {
    padding: 8px 12px;
    border: 1px solid #ccc;
    text-align: left;
  }
  th {
    background-color: #333;
    color: #fff;
  }
  button.delete {
    background-color: #e74c3c;
    color: white;
    border: none;
    padding: 4px 8px;
    cursor: pointer;
  }
</style>
</head>
<body>
<h1>Tabla de Goleadores</h1>
<form id="player-form">
  <input type="text" id="dni" placeholder="DNI" required>
  <select id="category" required>
    <option value="">Categoría</option>
    <option value="Futbol 7">Fútbol 7</option>
    <option value="Futbol 9">Fútbol 9</option>
    <option value="Futbol 11">Fútbol 11</option>
    <option value="Sub 20">Sub 20</option>
  </select>
  <input type="text" id="team" placeholder="Equipo" required>
  <input type="number" id="goals" placeholder="Goles" min="1" required>
  <button type="submit">Agregar / Actualizar</button>
</form>
<table id="score-table">
  <thead>
    <tr>
      <th>DNI</th>
      <th>Categoría</th>
      <th>Equipo</th>
      <th>Goles</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody>
  </tbody>
</table>
<script>
const storageKey = 'scorers';
const form = document.getElementById('player-form');
const tableBody = document.querySelector('#score-table tbody');
function loadData() {
  const data = JSON.parse(localStorage.getItem(storageKey) || '[]');
  return data;
}
function saveData(data) {
  localStorage.setItem(storageKey, JSON.stringify(data));
}
function renderTable() {
  const data = loadData();
  tableBody.innerHTML = '';
  data.forEach((p, index) => {
    const row = document.createElement('tr');
    row.innerHTML = `<td>${p.dni}</td><td>${p.category}</td><td>${p.team}</td><td>${p.goals}</td>`;
    const actions = document.createElement('td');
    const delBtn = document.createElement('button');
    delBtn.textContent = 'Eliminar';
    delBtn.className = 'delete';
    delBtn.addEventListener('click', () => deletePlayer(index));
    actions.appendChild(delBtn);
    row.appendChild(actions);
    tableBody.appendChild(row);
  });
}
function addOrUpdatePlayer(player) {
  const data = loadData();
  const existing = data.find(p => p.dni === player.dni && p.category === player.category);
  if (existing) {
    existing.goals += player.goals;
  } else {
    data.push(player);
  }
  saveData(data);
  renderTable();
}
function deletePlayer(index) {
  const data = loadData();
  data.splice(index, 1);
  saveData(data);
  renderTable();
}
form.addEventListener('submit', e => {
  e.preventDefault();
  const player = {
    dni: document.getElementById('dni').value.trim(),
    category: document.getElementById('category').value,
    team: document.getElementById('team').value.trim(),
    goals: parseInt(document.getElementById('goals').value, 10)
  };
  addOrUpdatePlayer(player);
  form.reset();
});
renderTable();
</script>
</body>
</html>
